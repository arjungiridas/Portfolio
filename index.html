<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arjun Giridas | DevOps Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* THEME */
:root {
    --bg:#ffffff;
    --text:#111;
    --sub:#666;
    --card:#f5f5f5;
}

.dark {
    --bg:#0b0f19;
    --text:#f1f5f9;
    --sub:#94a3b8;
    --card:#111827;
}

/* GLOBAL */
html {
    scroll-behavior: smooth;
}

body {
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
}

/* NAVBAR */
nav {
    position:sticky;
    top:0;
    background:var(--bg);
    padding:15px 20px;
    border-bottom:1px solid #eee;
    display:flex;
    justify-content:space-between;
    z-index:1000;
}

nav a {
    text-decoration:none;
    color:var(--text);
    margin-right:15px;
    font-size:14px;
}

/* DARK BUTTON */
.theme-btn {
    cursor:pointer;
}

/* HERO */
.hero {
    height:90vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1 {
    font-size:48px;
    font-weight:700;
    animation: fadeUp 1s ease forwards;
}

.hero p {
    color:var(--sub);
    animation: fadeUp 1s ease forwards;
    animation-delay:0.2s;
    opacity:0;
}

.btn {
    margin-top:20px;
    padding:12px 25px;
    border-radius:30px;
    background:var(--text);
    color:var(--bg);
    text-decoration:none;
    animation: fadeUp 1s ease forwards;
    animation-delay:0.4s;
    opacity:0;
    transition:0.3s;
}

.btn:hover {
    transform:scale(1.05);
}

/* ANIMATION */
@keyframes fadeUp {
    from { opacity:0; transform:translateY(30px); }
    to { opacity:1; transform:translateY(0); }
}

/* SECTION */
.container {
    max-width:1000px;
    margin:auto;
    padding:60px 20px;
}

/* SCROLL REVEAL */
.reveal {
    opacity:0;
    transform:translateY(40px);
    transition:0.8s ease;
}

.reveal.active {
    opacity:1;
    transform:translateY(0);
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

/* CARD */
.card {
    background:var(--card);
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:all 0.3s ease;
}

.card:hover {
    transform:translateY(-10px) scale(1.02);
    box-shadow:0 20px 40px rgba(0,0,0,0.1);
}

.card img {
    width:100%;
    height:180px;
    object-fit:cover;
}

/* MODAL */
.modal {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:var(--bg);
    padding:20px;
    border-radius:10px;
    max-width:400px;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:40px;
    color:var(--sub);
}

</style>
</head>

<body>

<!-- NAV -->
<nav>
    <div>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </div>
    <div class="theme-btn" onclick="toggleMode()">🌙</div>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>Arjun Giridas</h1>
    <p>DevOps Engineer | Automation | Cloud</p>
    <a href="doc/Arjun Giridas Resume.pdf" class="btn">Download Resume</a>
</section>

<!-- PROJECTS -->
<div class="container reveal" id="projects">
    <h2>Projects</h2>

    <div class="grid">

        <div class="card" onclick="openModal('CI/CD Pipeline','Automated deployment using Docker & GitHub Actions')">
            <img src="images/slack.png">
        </div>

        <div class="card" onclick="openModal('Flask Deployment','Dockerized Flask application')">
            <img src="images/flask.png">
        </div>

        <div class="card" onclick="openModal('Monitoring','Prometheus & Grafana dashboard')">
            <img src="images/monitoring.png">
        </div>

        <div class="card" onclick="openModal('Uptime Tool','Python-based alert monitoring system')">
            <img src="images/alerts.png">
        </div>

    </div>
</div>

<!-- CONTACT -->
<div class="container reveal" id="contact">
    <h2>Contact</h2>
    <p>Email: arjungiridas123456@gmail.com</p>
    <p><a href="https://github.com/arjungiridas">GitHub</a></p>
    <p><a href="https://linkedin.com/in/arjungiridas">LinkedIn</a></p>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
    <div class="modal-content">
        <span onclick="closeModal()" style="cursor:pointer;">✖</span>
        <h3 id="modal-title"></h3>
        <p id="modal-desc"></p>
    </div>
</div>

<div class="footer">© 2026 Arjun Giridas</div>

<script>

// DARK MODE
function toggleMode() {
    document.body.classList.toggle("dark");
}

// MODAL
function openModal(title, desc) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modal-title").innerText = title;
    document.getElementById("modal-desc").innerText = desc;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

// SCROLL REVEAL
const reveals = document.querySelectorAll(".reveal");

function revealOnScroll() {
    const windowHeight = window.innerHeight;

    reveals.forEach(el => {
        const top = el.getBoundingClientRect().top;

        if (top < windowHeight - 100) {
            el.classList.add("active");
        }
    });
}

window.addEventListener("scroll", revealOnScroll);
revealOnScroll();

</script>

</body>
</html>
