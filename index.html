<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arjun Giridas | DevOps Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* THEME */
:root {
    --bg: #ffffff;
    --text: #111;
    --sub: #666;
    --card: #f8fafc;
    --accent: linear-gradient(135deg,#2563eb,#7c3aed);
}

.dark {
    --bg: #0b0f19;
    --text: #f1f5f9;
    --sub: #94a3b8;
    --card: #111827;
}

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.4s;
}

/* LOADER */
#loader {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #ccc;
    border-top: 3px solid #2563eb;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* CURSOR GLOW */
#cursor-glow {
    position: fixed;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(37,99,235,0.2), transparent);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
}

/* NAV */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    backdrop-filter: blur(12px);
    padding: 15px 30px;
    display: flex;
    justify-content: space-between;
    z-index: 1000;
}

nav a {
    margin-right: 20px;
    text-decoration: none;
    color: var(--text);
}

/* DARK BUTTON */
.theme-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: var(--accent);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
}

.hero h1 {
    font-size: 64px;
    font-weight: 700;
    background: var(--accent);
    -webkit-background-clip: text;
    color: transparent;
}

.hero p {
    color: var(--sub);
}

/* BUTTON */
.btn {
    margin-top: 25px;
    padding: 12px 28px;
    border-radius: 999px;
    background: var(--text);
    color: var(--bg);
    text-decoration: none;
}

/* SECTION */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 80px 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
}

/* CARD */
.card {
    position: relative;
    overflow: hidden;
    border-radius: 16px;
    background: var(--card);
    cursor: pointer;
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-12px);
}

/* GLOW */
.card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: 0.4s;
}

.card:hover::before {
    opacity: 0.15;
}

/* IMAGE */
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* CONTENT */
.card-content {
    padding: 20px;
}

/* FADE */
.fade {
    opacity: 0;
    transform: translateY(40px);
    transition: 0.7s ease;
}

.fade.show {
    opacity: 1;
    transform: translateY(0);
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: var(--bg);
    padding: 30px;
    border-radius: 12px;
    max-width: 500px;
}

.close {
    float: right;
    cursor: pointer;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 50px;
    color: var(--sub);
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader"><div class="spinner"></div></div>

<!-- CURSOR GLOW -->
<div id="cursor-glow"></div>

<nav>
    <div>
        <a href="#projects">Projects</a>
        <a href="#contact">Contact</a>
    </div>
</nav>

<div class="theme-btn" onclick="toggleMode()">🌙</div>

<!-- HERO -->
<section class="hero">
    <h1>Arjun Giridas</h1>
    <p>DevOps Engineer | Automation | Cloud</p>
    <a href="doc/Arjun Giridas Resume.pdf" class="btn">Download Resume</a>
</section>

<!-- PROJECTS -->
<div class="container fade" id="projects">
<h2>Projects</h2>

<div class="grid">

<div class="card" onclick="openModal('CI/CD Pipeline','Automated deployment using Docker & GitHub Actions')">
<img src="images/slack.png">
<div class="card-content"><h3>CI/CD Pipeline</h3></div>
</div>

<div class="card" onclick="openModal('Flask App','Dockerized Flask deployment')">
<img src="images/flask.png">
<div class="card-content"><h3>Flask Deployment</h3></div>
</div>

<div class="card" onclick="openModal('Monitoring','Prometheus & Grafana')">
<img src="images/monitoring.png">
<div class="card-content"><h3>Monitoring</h3></div>
</div>

<div class="card" onclick="openModal('Uptime Tool','Python alert system')">
<img src="images/alerts.png">
<div class="card-content"><h3>Uptime Monitoring</h3></div>
</div>

</div>
</div>

<!-- CONTACT -->
<div class="container fade" id="contact">
<h2>Contact</h2>
<p>Email: arjungiridas123456@gmail.com</p>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span onclick="closeModal()" class="close">×</span>
<h2 id="modal-title"></h2>
<p id="modal-desc"></p>
</div>
</div>

<div class="footer">© 2026 Arjun Giridas</div>

<script>

// LOADER
window.onload = () => {
    document.getElementById("loader").style.display = "none";
};

// DARK MODE
function toggleMode() {
    document.body.classList.toggle("dark");
}

// CURSOR GLOW
document.addEventListener("mousemove", e => {
    const glow = document.getElementById("cursor-glow");
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
});

// SCROLL ANIMATION
const items = document.querySelectorAll(".fade");
window.addEventListener("scroll", () => {
    items.forEach(el => {
        if (el.getBoundingClientRect().top < window.innerHeight - 100) {
            el.classList.add("show");
        }
    });
});

// MODAL
function openModal(title, desc) {
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modal-title").innerText = title;
    document.getElementById("modal-desc").innerText = desc;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
