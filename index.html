<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arjun Giridas | DevOps Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>

/* THEME */
:root {
    --bg: #ffffff;
    --text: #111;
    --sub: #666;
    --card: #f8fafc;
    --accent: linear-gradient(135deg,#2563eb,#7c3aed);
}

.dark {
    --bg: #0b0f19;
    --text: #f1f5f9;
    --sub: #94a3b8;
    --card: #111827;
}

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.4s;
    overflow-x: hidden;
}

/* LOADER */
#loader {
    position: fixed;
    inset: 0;
    background: var(--bg);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

.spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #ccc;
    border-top: 3px solid #2563eb;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* CURSOR GLOW */
#cursor-glow {
    position: fixed;
    width: 300px;
    height: 300px;
    background: radial-gradient(circle, rgba(37,99,235,0.2), transparent);
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%);
}

/* DARK BUTTON */
.theme-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--accent);
    padding: 15px;
    border-radius: 50%;
    color: white;
    cursor: pointer;
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

.hero h1 {
    font-size: 64px;
    background: var(--accent);
    -webkit-background-clip: text;
    color: transparent;
}

.hero p { color: var(--sub); }

.btn {
    margin-top: 20px;
    padding: 12px 28px;
    border-radius: 999px;
    background: var(--text);
    color: var(--bg);
    text-decoration: none;
}

/* CONTAINER */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 80px 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(280px,1fr));
    gap: 30px;
}

/* CARD */
.card {
    border-radius: 16px;
    background: var(--card);
    overflow: hidden;
    cursor: pointer;
    transition: 0.4s;
}

.card:hover { transform: translateY(-10px); }

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* MODAL */
.modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: var(--bg);
    padding: 30px;
    border-radius: 12px;
}

.close { cursor: pointer; }

/* FOOTER */
.footer {
    text-align: center;
    padding: 50px;
    color: var(--sub);
}

</style>
</head>

<body>

<div id="loader"><div class="spinner"></div></div>
<div id="cursor-glow"></div>
<div class="theme-btn" onclick="toggleMode()">🌙</div>

<!-- HERO -->
<section class="hero animate-hero">
<h1>Arjun Giridas</h1>
<p>DevOps Engineer | Automation | Cloud</p>
<a href="Arjun_Giridas_Resume.pdf" class="btn">Download Resume</a>
</section>

<!-- PROJECTS -->
<div class="container animate-section">
<h2>Projects</h2>

<div class="grid">

<div class="card tilt animate-card" onclick="openModal('CI/CD','Automation pipeline')">
<img src="images/slack.png">
</div>

<div class="card tilt animate-card" onclick="openModal('Flask','Docker deployment')">
<img src="images/flask.png">
</div>

<div class="card tilt animate-card" onclick="openModal('Monitoring','Grafana')">
<img src="images/monitoring.png">
</div>

<div class="card tilt animate-card" onclick="openModal('Uptime','Python alerts')">
<img src="images/alerts.png">
</div>

</div>
</div>

<!-- CONTACT -->
<div class="container animate-section">
<h2>Contact</h2>
<p>Email: arjungiridas123456@gmail.com</p>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeModal()">×</span>
<h2 id="modal-title"></h2>
<p id="modal-desc"></p>
</div>
</div>

<div class="footer">© 2026 Arjun Giridas</div>

<script>

// LOADER
window.onload = () => document.getElementById("loader").style.display="none";

// DARK MODE
function toggleMode(){ document.body.classList.toggle("dark"); }

// CURSOR
document.addEventListener("mousemove", e=>{
let g=document.getElementById("cursor-glow");
g.style.left=e.clientX+"px"; g.style.top=e.clientY+"px";
});

// MODAL
function openModal(t,d){
document.getElementById("modal").style.display="flex";
document.getElementById("modal-title").innerText=t;
document.getElementById("modal-desc").innerText=d;
}
function closeModal(){
document.getElementById("modal").style.display="none";
}

// 3D TILT
document.querySelectorAll(".tilt").forEach(card=>{
card.addEventListener("mousemove",e=>{
let x=e.offsetX,y=e.offsetY;
card.style.transform=`rotateX(${-(y-100)/10}deg) rotateY(${(x-150)/10}deg)`;
});
card.addEventListener("mouseleave",()=>card.style.transform="rotateX(0) rotateY(0)");
});

// GSAP
gsap.registerPlugin(ScrollTrigger);

gsap.from(".animate-hero h1",{y:80,opacity:0,duration:1});
gsap.from(".animate-hero p",{y:40,opacity:0,delay:0.3});

gsap.utils.toArray(".animate-section").forEach(sec=>{
gsap.from(sec,{
scrollTrigger:{trigger:sec,start:"top 80%"},
y:80,opacity:0,duration:1
});
});

gsap.from(".animate-card",{
scrollTrigger:{trigger:".grid",start:"top 80%"},
y:60,opacity:0,stagger:0.2
});

</script>

</body>
</html>
