<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arjun Giridas | DevOps Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* THEME */
:root {
    --bg: #ffffff;
    --text: #111;
    --sub: #666;
    --card: #f8fafc;
    --accent: linear-gradient(135deg,#2563eb,#7c3aed);
}

.dark {
    --bg: #0b0f19;
    --text: #f1f5f9;
    --sub: #94a3b8;
    --card: #111827;
}

/* GLOBAL */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.4s;
    overflow-x: hidden;
}

/* HERO PARALLAX */
.hero {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: radial-gradient(circle at center, rgba(37,99,235,0.15), transparent);
    position: relative;
    overflow: hidden;
        /* keep text centered */
.hero h1, .hero p, .btn {
    position: relative;
    z-index: 2;
}
}

.hero h1 {
    font-size: 64px;
    background: var(--accent);
    -webkit-background-clip: text;
    color: transparent;
}
/* BASE IMAGE */
.bg-image {
    position: absolute;
    left: 0;   /* 👈 move to LEFT */
    bottom: 0;
    height: 95%;
    pointer-events: none;
    transition: opacity 0.6s ease, transform 0.6s ease;
    transform: translateX(-10%); /* slight offset */
    z-index: 1;
}

/* LIGHT MODE */
.light-img {
    opacity: 0.1;
    filter: grayscale(100%) contrast(140%);
    mix-blend-mode: multiply;
}

/* DARK MODE IMAGE (SUBTLE + PREMIUM) */
.dark-img {
    opacity: 0.15;
    mix-blend-mode: screen;
    filter: brightness(115%) contrast(125%);
}

/* WHEN DARK MODE ACTIVE */
.dark .dark-img {
    opacity: 0.18;   /* 👈 PERFECT BALANCE */
    transform: scale(1.02);
}

/* LIGHT IMAGE HIDE */
.dark .light-img {
    opacity: 0;
}
.hero-layer {
    position: absolute;
    width: 300px;
    height: 300px;
    background: var(--accent);
    filter: blur(120px);
    opacity: 0.2;
}

/* BUTTON */
.btn {
    margin-top: 25px;
    padding: 12px 28px;
    border-radius: 999px;
    background: var(--text);
    color: var(--bg);
    text-decoration: none;
}

/* CONTAINER */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 80px 20px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
}

/* CARD */
.card {
    border-radius: 16px;
    background: var(--card);
    padding: 20px;
    transition: transform 0.2s ease;
    transform-style: preserve-3d;
}

.card img {
    width: 100%;
    border-radius: 10px;
}

/* FEATURE SECTION */
.features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 20px;
}

.feature {
    padding: 20px;
}

/* DARK BUTTON */
.theme-btn {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--accent);
    color: white;
    padding: 15px;
    border-radius: 50%;
    cursor: pointer;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 50px;
    color: var(--sub);
}

</style>
</head>

<body>

<div class="theme-btn" onclick="toggleMode()">🌙</div>

<!-- HERO -->
<section class="hero">

    <!-- BACKGROUND IMAGES -->
    <img src="images/profile-light.png" class="bg-image light-img">
    <img src="images/profile-dark.png" class="bg-image dark-img">

    <div class="hero-layer" id="layer1"></div>
    <div class="hero-layer" id="layer2"></div>

    <h1>Arjun Giridas</h1>
    <p>DevOps Engineer | Automation | Cloud</p>
    <a href="doc/Arjun Giridas Resume.pdf" class="btn">Download Resume</a>

</section>

<!-- FEATURES (PRODUCT STYLE) -->
<div class="container">
<h2>What I Do</h2>

<div class="features">
<div class="feature">⚙️ Automate CI/CD pipelines</div>
<div class="feature">🐳 Containerized deployments</div>
<div class="feature">📊 Monitoring & observability</div>
<div class="feature">☁️ Cloud-ready infrastructure</div>
</div>
</div>

<!-- PROJECTS -->
<div class="container">
<h2>Projects</h2>

<div class="grid">

<div class="card tilt">
<img src="images/slack.png">
<h3>CI/CD Pipeline</h3>
</div>

<div class="card tilt">
<img src="images/flask.png">
<h3>Flask Deployment</h3>
</div>

<div class="card tilt">
<img src="images/monitoring.png">
<h3>Monitoring</h3>
</div>

<div class="card tilt">
<img src="images/alerts.png">
<h3>Uptime Tool</h3>
</div>

</div>
</div>

<div class="footer">© 2026 Arjun Giridas</div>

<script>

// DARK MODE
function toggleMode() {
    document.body.classList.toggle("dark");
}

// PARALLAX
document.addEventListener("mousemove", e => {
    document.getElementById("layer1").style.transform =
        `translate(${e.clientX/20}px, ${e.clientY/20}px)`;

    document.getElementById("layer2").style.transform =
        `translate(${e.clientX/40}px, ${e.clientY/40}px)`;
});

// 3D TILT
document.querySelectorAll(".tilt").forEach(card => {
    card.addEventListener("mousemove", e => {
        let x = e.offsetX;
        let y = e.offsetY;
        let rotateX = -(y - 100) / 10;
        let rotateY = (x - 150) / 10;

        card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;
    });

    card.addEventListener("mouseleave", () => {
        card.style.transform = "rotateX(0) rotateY(0)";
    });
});

</script>

</body>
</html>
