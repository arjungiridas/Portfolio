<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arjun Giridas | DevOps Engineer</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

<style>

/* THEME */
:root {
    --bg:#ffffff;
    --text:#111;
    --sub:#666;
    --card:#f3f4f6;
}

.dark {
    --bg:#0b0f19;
    --text:#f1f5f9;
    --sub:#94a3b8;
    --card:#111827;
}

/* GLOBAL */
body {
    margin:0;
    font-family:'Inter',sans-serif;
    background:var(--bg);
    color:var(--text);
    transition:0.3s;
}

/* LOADER */
#loader {
    position:fixed;
    inset:0;
    background:var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
}

.spinner {
    width:40px;height:40px;
    border:3px solid #ccc;
    border-top:3px solid #2563eb;
    border-radius:50%;
    animation:spin 1s linear infinite;
}

@keyframes spin { to {transform:rotate(360deg);} }

/* HERO */
.hero {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1 {
    font-size:56px;
}

.hero p {
    color:var(--sub);
}

/* BUTTON */
.btn {
    margin-top:20px;
    padding:10px 25px;
    border-radius:30px;
    background:var(--text);
    color:var(--bg);
    text-decoration:none;
}

/* DARK BUTTON */
.theme-btn {
    position:fixed;
    bottom:20px;
    right:20px;
    background:#2563eb;
    color:white;
    padding:12px;
    border-radius:50%;
    cursor:pointer;
}

/* CONTAINER */
.container {
    max-width:1100px;
    margin:auto;
    padding:60px 20px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

/* CARD */
.card {
    background:var(--card);
    border-radius:12px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card:hover {
    transform:translateY(-8px);
}

.card img {
    width:100%;
    height:180px;
    object-fit:cover;
}

/* MODAL */
.modal {
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:var(--bg);
    padding:20px;
    border-radius:10px;
}

/* FOOTER */
.footer {
    text-align:center;
    padding:40px;
    color:var(--sub);
}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader"><div class="spinner"></div></div>

<!-- DARK MODE -->
<div class="theme-btn" onclick="toggleMode()">🌙</div>

<!-- HERO -->
<section class="hero">
<h1>Arjun Giridas</h1>
<p>DevOps Engineer | Automation | Cloud</p>
<a href="Arjun_Giridas_Resume.pdf" class="btn">Download Resume</a>
</section>

<!-- PROJECTS -->
<div class="container">
<h2>Projects</h2>

<div class="grid">

<div class="card" onclick="openModal('CI/CD Pipeline','Automated deployment using Docker & GitHub Actions')">
<img src="images/slack.png">
</div>

<div class="card" onclick="openModal('Flask Deployment','Dockerized Flask app')">
<img src="images/flask.png">
</div>

<div class="card" onclick="openModal('Monitoring','Prometheus & Grafana')">
<img src="images/monitoring.png">
</div>

<div class="card" onclick="openModal('Uptime Tool','Python alert monitoring')">
<img src="images/alerts.png">
</div>

</div>
</div>

<!-- CONTACT -->
<div class="container">
<h2>Contact</h2>
<p>Email: arjungiridas123456@gmail.com</p>
</div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-content">
<span onclick="closeModal()" style="cursor:pointer;">✖</span>
<h3 id="modal-title"></h3>
<p id="modal-desc"></p>
</div>
</div>

<div class="footer">© 2026 Arjun Giridas</div>

<script>

// LOADER
window.onload = () => {
    document.getElementById("loader").style.display="none";
};

// DARK MODE
function toggleMode(){
    document.body.classList.toggle("dark");
}

// MODAL
function openModal(t,d){
    document.getElementById("modal").style.display="flex";
    document.getElementById("modal-title").innerText=t;
    document.getElementById("modal-desc").innerText=d;
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

// GSAP SAFE (NO HIDING)
gsap.from(".hero h1",{y:40,opacity:0,duration:1});
gsap.from(".hero p",{y:20,opacity:0,delay:0.3});

gsap.from(".card",{
    scrollTrigger:{
        trigger:".grid",
        start:"top 85%"
    },
    y:30,
    opacity:0,
    stagger:0.2,
    duration:0.6
});

</script>

</body>
</html>
